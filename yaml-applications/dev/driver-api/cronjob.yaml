apiVersion: batch/v1
kind: CronJob
metadata:
  name: plannify-driver-delete-garbage
  namespace: plannify-dev
spec:
  schedule: "0 0 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: job
              image: ghcr.io/plannify-truck-driver/driver-api:0.0.55
              command: ["job"]
              args: ["delete-garbage"]
              resources:
                requests:
                  cpu: "40m"
                  memory: "32Mi"
                limits:
                  cpu: "100m"
                  memory: "64Mi"
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: dev-database-secrets
                      key: DATABASE_URL
                - name: REDIS_URL
                  valueFrom:
                    secretKeyRef:
                      name: dev-database-secrets
                      key: REDIS_URL
                - name: FRONTEND_URL
                  value: "https://driver-dev.plannify.be"
                - name: PDF_SERVICE_ENDPOINT
                  value: "http://plannify-pdf-service:3000"
                - name: SMTP_DEFAULT_SENDER
                  valueFrom:
                    secretKeyRef:
                      name: dev-smtp-secrets
                      key: SMTP_DEFAULT_SENDER
                - name: SMTP_DEFAULT_SENDER_REPLY_TO
                  valueFrom:
                    secretKeyRef:
                      name: dev-smtp-secrets
                      key: SMTP_DEFAULT_SENDER_REPLY_TO
                - name: SMTP_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: dev-smtp-secrets
                      key: SMTP_USERNAME
                - name: SMTP_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: dev-smtp-secrets
                      key: SMTP_PASSWORD
                - name: SMTP_DOMAIN
                  valueFrom:
                    secretKeyRef:
                      name: dev-smtp-secrets
                      key: SMTP_DOMAIN
                - name: S3_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: plannify-dev-garage
                      key: S3_ACCESS_KEY
                - name: S3_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: plannify-dev-garage
                      key: S3_SECRET_KEY
                - name: S3_BUCKET_NAME
                  valueFrom:
                    secretKeyRef:
                      name: plannify-dev-garage
                      key: S3_BUCKET_NAME
                - name: S3_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: plannify-dev-garage
                      key: S3_ENDPOINT
                - name: S3_REGION
                  valueFrom:
                    secretKeyRef:
                      name: plannify-dev-garage
                      key: S3_REGION
          imagePullSecrets:
            - name: ghcr-secret
---
