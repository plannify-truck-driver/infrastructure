# Source: garage-ui/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plannify-dev-garage-ui
  namespace: plannify-dev
  labels:
    helm.sh/chart: garage-ui-0.2.5
    app.kubernetes.io/name: plannify-dev-garage-ui
    app.kubernetes.io/instance: plannify-dev-garage-ui
    app.kubernetes.io/version: "v0.4.2"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: plannify-dev-garage-ui
      app.kubernetes.io/instance: plannify-dev-garage-ui
  template:
    metadata:
      annotations:
        checksum/config: f3b533193689cebb3826cf8b174476c6094450fcf7ad9a38b5f7a92ea2f8af95
      labels:
        app.kubernetes.io/name: plannify-dev-garage-ui
        app.kubernetes.io/instance: plannify-dev-garage-ui
    spec:
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: garage-ui
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
          image: "noooste/garage-ui:v0.4.2"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: GARAGE_UI_GARAGE_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: plannify-dev-garage-ui
                  key: ADMIN_TOKEN
            - name: GARAGE_UI_AUTH_JWT_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: plannify-dev-garage-ui-jwt-key
                  key: jwt-key.pem
            - name: GARAGE_UI_AUTH_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: plannify-dev-garage-ui
                  key: ADMIN_PASSWORD
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: plannify-dev-garage-ui-config
